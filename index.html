<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仕込み水温計算機</title>
    
    <!-- PWA対応のための追加要素 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8D6E63">
    <link rel="apple-touch-icon" href="icon-192.png"> <!-- iOSのホーム画面用アイコン -->

    <style>
        :root {
            --primary-color: #8D6E63;
            --accent-color: #FF7043;
            --bg-color: #F5F5F5;
            --card-bg: #FFFFFF;
            --text-color: #3E2723;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 24px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: var(--primary-color);
            border-bottom: 2px solid #EFEBE9;
            padding-bottom: 12px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; }
        .range-info { font-size: 0.8rem; color: #888; font-weight: normal; }

        input[type="number"] {
            width: 100%; padding: 12px; font-size: 1.1rem; border: 2px solid #E0E0E0; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"]:focus { outline: none; border-color: var(--accent-color); background-color: #FFF3E0; }

        .calc-btn {
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s, transform 0.1s; margin-top: 10px;
        }
        .calc-btn:active { transform: scale(0.98); background-color: #6D4C41; }

        .result-area { margin-top: 24px; padding: 20px; background-color: #EFEBE9; border-radius: 8px; text-align: center; }
        .result-label { font-size: 0.9rem; color: #5D4037; margin-bottom: 8px; }
        .result-value { font-size: 2.5rem; font-weight: bold; color: var(--primary-color); }
        .unit { font-size: 1.2rem; margin-left: 4px; }
        .freezing { color: #1E88E5 !important; }
        .warning { color: #D32F2F !important; }

        .footer-note { margin-top: 20px; font-size: 0.75rem; color: #999; text-align: center; line-height: 1.4; }

        @media (max-width: 400px) {
            body { padding: 10px; }
            h1 { font-size: 1.3rem; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍞 仕込み水温計算機</h1>

    <div class="form-group">
        <label for="targetTemp">目標生地温 <span class="range-info">15〜30℃</span></label>
        <input type="number" id="targetTemp" placeholder="例: 26" min="15" max="30" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label for="flourTemp">粉温 <span class="range-info">0〜50℃</span></label>
        <input type="number" id="flourTemp" placeholder="例: 20" min="0" max="50" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label for="roomTemp">室温 <span class="range-info">0〜50℃</span></label>
        <input type="number" id="roomTemp" placeholder="例: 25" min="0" max="50" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label for="starterTemp">湯種温 <span class="range-info">15〜30℃</span></label>
        <input type="number" id="starterTemp" placeholder="例: 20" min="15" max="30" step="0.1" inputmode="decimal">
    </div>

    <div class="form-group">
        <label for="frictionTemp">摩擦温度 <span class="range-info">5〜10℃</span></label>
        <input type="number" id="frictionTemp" placeholder="例: 6" min="5" max="10" step="0.1" inputmode="decimal">
    </div>

    <button class="calc-btn" onclick="calculateWaterTemp()">計算する</button>

    <div class="result-area">
        <div class="result-label">必要な仕込み水の温度</div>
        <div class="result-value" id="resultValue">--<span class="unit">℃</span></div>
        <div id="adviceText" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold;"></div>
    </div>

    <div class="footer-note">
        計算式: (目標生地温×3) - (粉温+室温+湯種温+摩擦温度)<br>
        推奨範囲外の数値も入力可能です。
    </div>
</div>
<script type="text/javascript">
  document.body.style.display = 'none';
  window.onload = function() {
    var UserInput = null;

    var cookies = document.cookie;
    var cookiesArray = cookies.split(';');
    var pass = 'MjYwMzE4';

    for(var c of cookiesArray){
      var cArray = c.split('=');
      if(cArray[0].indexOf('cruw-basic') > -1){
        UserInput = decodeURIComponent(cArray[1]);
      }
    }
    if(!(UserInput && UserInput == window.atob(pass))){
      UserInput = prompt("パスワードを入力して下さい:","");
    }

    if(UserInput != window.atob(pass)){
      document.body.innerHTML = "403 Forbidden";
    }else{
      var now = new Date();
      now.setMinutes(now.getMinutes() + 60*24*3);
      document.cookie = "cruw-basic=" + encodeURIComponent(UserInput) + ";expires=" + now.toUTCString()+"; path=/;";
    }
    document.body.style.display = null;
  }
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker の登録に成功しました。スコープ: ', registration.scope);
                })
                .catch(err => {
                    console.log('ServiceWorker の登録に失敗しました: ', err);
                });
        });
    }
    function calculateWaterTemp() {
        const targetTemp = parseFloat(document.getElementById('targetTemp').value);
        const flourTemp = parseFloat(document.getElementById('flourTemp').value);
        const roomTemp = parseFloat(document.getElementById('roomTemp').value);
        const starterTemp = parseFloat(document.getElementById('starterTemp').value);
        const frictionTemp = parseFloat(document.getElementById('frictionTemp').value);

        const resultDisplay = document.getElementById('resultValue');
        const adviceText = document.getElementById('adviceText');

        if (isNaN(targetTemp) || isNaN(flourTemp) || isNaN(roomTemp) || isNaN(starterTemp) || isNaN(frictionTemp)) {
            resultDisplay.innerHTML = '--<span class="unit">℃</span>';
            resultDisplay.classList.remove('freezing', 'warning');
            adviceText.textContent = "全ての項目に数値を入力してください。";
            adviceText.style.color = "#D32F2F";
            return;
        }

        const waterTemp = (targetTemp * 3) - (flourTemp + roomTemp + starterTemp + frictionTemp);
        const formattedResult = waterTemp.toFixed(1);
        resultDisplay.innerHTML = `${formattedResult}<span class="unit">℃</span>`;

        resultDisplay.classList.remove('freezing', 'warning');
        adviceText.style.color = "#5D4037";

        if (waterTemp < 0) {
            resultDisplay.classList.add('freezing');
            adviceText.textContent = "氷水を使用する必要があります。";
        } else if (waterTemp > 50) {
            resultDisplay.classList.add('warning');
            adviceText.textContent = "かなり高温の水が必要です。火傷にご注意ください。";
        } else if (waterTemp < 5) {
            resultDisplay.classList.add('freezing');
            adviceText.textContent = "冷蔵庫で冷やした水を使用してください。";
        } else {
            adviceText.textContent = "";
        }
    }
</script>

</body>
</html>
